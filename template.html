<html class="staticrypt-html">

        />

        <style>
            /* ── Reset & base ─────────────────────────────────────── */
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
            }

            .staticrypt-body {
                font-family: "Poppins", ui-sans-serif, system-ui, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                color: #3a2f26;
            }

            /* ── Background — warm cream → sage green gradient + grain ── */
            .staticrypt-content {
                min-height: 100%;
                background:
                    radial-gradient(ellipse at 70% 30%, #8bab9e55 0%, transparent 60%),
                    radial-gradient(ellipse at 20% 80%, #8bab9e33 0%, transparent 55%),
                    #fdf7e6;
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 48px 16px;
            }

            /* Subtle grain overlay */
            .staticrypt-content::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 0;
                opacity: 0.045;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
                background-repeat: repeat;
                background-size: 200px 200px;
            }

            /* ── Page wrapper ─────────────────────────────────────── */
            .staticrypt-page {
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 400px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 28px;
            }

            /* ── Logo ─────────────────────────────────────────────── */
            .staticrypt-logo {
                width: 130px;
                height: auto;
                display: block;
            }

            /* ── Card ─────────────────────────────────────────────── */
            .staticrypt-form {
                width: 100%;
                background: #fffcf3;
                border-radius: 0.625rem;
                padding: 36px 32px;
                box-shadow:
                    0 1px 3px rgba(58, 47, 38, 0.06),
                    0 8px 24px rgba(58, 47, 38, 0.08);
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            /* ── Title & instructions ─────────────────────────────── */
            .staticrypt-title {
                font-size: 1.05rem;
                font-weight: 600;
                color: #3a2f26;
                line-height: 1.3;
            }

            .staticrypt-instructions {
                font-size: 0.875rem;
                color: #7a6a5e;
                line-height: 1.5;
            }

            .staticrypt-instructions:empty { display: none; }

            /* ── Divider ──────────────────────────────────────────── */
            .staticrypt-hr {
                border: 0;
                border-top: 1px solid #ede8df;
                margin: 0;
            }

            /* ── Password field ───────────────────────────────────── */
            .staticrypt-password-container {
                position: relative;
                background: #f0ebe2;
                border-radius: 0.5rem;
                border: 1.5px solid #e0d9cf;
                transition: border-color 0.15s;
            }

            .staticrypt-password-container:focus-within {
                border-color: #c8682a;
                outline: 3px solid rgba(200, 104, 42, 0.15);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                outline: 0;
                width: 100%;
                padding: 12px 44px 12px 14px;
                font-family: inherit;
                font-size: 0.9375rem;
                color: #3a2f26;
            }

            .staticrypt-form input[type="password"]::placeholder,
            .staticrypt-form input[type="text"]::placeholder {
                color: #a89e94;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.45;
                position: absolute;
                right: 13px;
                top: 50%;
                transform: translateY(-50%);
                transition: opacity 0.15s;
            }

            .staticrypt-toggle-password-visibility:hover { opacity: 0.7; }

            /* ── Remember me ──────────────────────────────────────── */
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 0.8125rem;
                color: #7a6a5e;
                cursor: pointer;
            }

            .staticrypt-remember input[type="checkbox"] {
                accent-color: #c8682a;
                width: 15px;
                height: 15px;
                flex-shrink: 0;
            }

            /* ── Decrypt button ───────────────────────────────────── */
            .staticrypt-decrypt-button {
                width: 100%;
                padding: 13px 16px;
                background: #c8682a;
                color: #fff;
                font-family: inherit;
                font-size: 0.875rem;
                font-weight: 500;
                letter-spacing: 0.04em;
                border: 0;
                border-radius: 0.5rem;
                cursor: pointer;
                transition: filter 0.15s;
            }

            .staticrypt-decrypt-button:hover,
            .staticrypt-decrypt-button:focus {
                filter: brightness(92%);
                outline: none;
            }

            /* ── Spinner ──────────────────────────────────────────── */
            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.2em solid #d4cdc5;
                border-right-color: #c8682a;
                border-radius: 50%;
                animation: spin 0.75s linear infinite;
            }

            @keyframes spin { to { transform: rotate(360deg); } }

            /* ── Utilities ────────────────────────────────────────── */
            .hidden { display: none !important; }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] { font-size: 16px; }
            }
        </style>
    </head>
